<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정기시험 출제 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:        #3182f6;
    --blue-light:  #ebf3fe;
    --blue-mid:    #c4dcfd;
    --bg:          #f9fafb;
    --surface:     #ffffff;
    --border:      #e5e8eb;
    --border-soft: #f2f4f6;
    --text:        #191f28;
    --text-sub:    #6b7684;
    --text-hint:   #b0b8c1;
    --radius-lg:   14px;
    --radius-md:   10px;
    --radius-sm:   7px;
    --shadow-sm:   0 1px 4px rgba(0,0,0,0.06);
    --shadow-md:   0 4px 16px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 24px 24px;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }
  header p {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 400;
  }

  /* ── Main ── */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Section card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.18s, border-color 0.18s;
  }
  .card.active {
    border-color: var(--blue-mid);
    box-shadow: var(--shadow-md);
  }

  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-soft);
  }
  .step-dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--blue-light);
    color: var(--blue);
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .step-dot.done {
    background: var(--blue);
    color: #fff;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 1px;
  }
  .card-badge {
    margin-left: auto;
    background: var(--blue-light);
    color: var(--blue);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    display: none;
    white-space: nowrap;
  }

  .card-body { padding: 18px 20px; }

  /* ── Select buttons ── */
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .sel-btn {
    padding: 8px 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.13s;
    letter-spacing: -0.01em;
  }
  .sel-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: var(--blue-light);
  }
  .sel-btn.selected {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
    font-weight: 600;
  }

  /* ── Standards list ── */
  .list-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .list-label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
  }
  .list-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--blue);
    background: var(--blue-light);
    border-radius: 20px;
    padding: 2px 10px;
  }

  .std-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 13px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .std-item:last-child { border-bottom: none; }

  .std-num {
    min-width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--border-soft);
    color: var(--text-hint);
    font-size: 10px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .std-inner {}
  .std-code {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--blue);
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 0.02em;
    margin-bottom: 3px;
  }
  .std-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    font-weight: 400;
  }

  /* ── Placeholder ── */
  .placeholder {
    text-align: center;
    padding: 28px 20px;
    color: var(--text-hint);
    font-size: 13px;
  }
  .placeholder-icon {
    font-size: 24px;
    margin-bottom: 8px;
    opacity: 0.6;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    header h1 { font-size: 19px; }
    main { padding: 20px 16px 60px; }
    .card-head { padding: 14px 16px; }
    .card-body { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">석수중학교 · 2026학년도 1학기</div>
    <h1>정기시험 출제 도우미</h1>
    <p>학년과 과목을 선택하면 교육과정 성취기준을 확인할 수 있습니다.</p>
  </div>
</header>

<main>
  <!-- Step 1 -->
  <div class="card active" id="card-grade">
    <div class="card-head">
      <div class="step-dot" id="dot-grade">1</div>
      <div>
        <div class="card-title">학년 선택</div>
        <div class="card-sub">출제할 학년을 선택하세요.</div>
      </div>
      <div class="card-badge" id="badge-grade"></div>
    </div>
    <div class="card-body">
      <div class="btn-group">
        <button class="sel-btn" data-grade="2" onclick="selectGrade(2)">2학년</button>
        <button class="sel-btn" data-grade="3" onclick="selectGrade(3)">3학년</button>
      </div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card" id="card-subject">
    <div class="card-head">
      <div class="step-dot" id="dot-subject">2</div>
      <div>
        <div class="card-title">과목 선택</div>
        <div class="card-sub">출제할 과목을 선택하세요.</div>
      </div>
      <div class="card-badge" id="badge-subject"></div>
    </div>
    <div class="card-body" id="subject-body">
      <div class="placeholder">
        <div class="placeholder-icon">🏫</div>
        학년을 먼저 선택해주세요.
      </div>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="card" id="card-standards">
    <div class="card-head">
      <div class="step-dot" id="dot-standards">3</div>
      <div>
        <div class="card-title">성취기준</div>
        <div class="card-sub">정기시험 교육과정 성취기준입니다.</div>
      </div>
    </div>
    <div class="card-body" id="standards-body">
      <div class="placeholder">
        <div class="placeholder-icon">📋</div>
        과목을 선택하면 성취기준이 표시됩니다.
      </div>
    </div>
  </div>
</main>

const subjectsByGrade = {
  2: ["국어", "역사", "도덕", "수학", "과학", "영어", "한문"],
  3: ["국어", "사회", "역사", "수학", "과학", "영어", "중국어"],
};

let state = { grade: null, subject: null };

function selectGrade(g) {
  state.grade = g;
  state.subject = null;

  document.querySelectorAll('[data-grade]').forEach(b =>
    b.classList.toggle('selected', parseInt(b.dataset.grade) === g));

  const badge = document.getElementById('badge-grade');
  badge.textContent = g + '학년';
  badge.style.display = 'inline-block';
  document.getElementById('dot-grade').classList.add('done');
  document.getElementById('card-grade').classList.add('active');

  renderSubjects(g);

  // 과목·성취기준 초기화
  document.getElementById('badge-subject').style.display = 'none';
  document.getElementById('dot-subject').classList.remove('done');
  document.getElementById('card-standards').classList.remove('active');
  document.getElementById('standards-body').innerHTML =
    '<div class="placeholder"><div class="placeholder-icon">📋</div>과목을 선택하면 성취기준이 표시됩니다.</div>';
}

function renderSubjects(g) {
  const subs = subjectsByGrade[g];
  let html = '<div class="btn-group">';
  subs.forEach(s => {
    html += `<button class="sel-btn" data-subject="${s}" onclick="selectSubject('${s}')">${s}</button>`;
  });
  html += '</div>';
  document.getElementById('subject-body').innerHTML = html;
  document.getElementById('card-subject').classList.add('active');
}

function selectSubject(s) {
  state.subject = s;

  document.querySelectorAll('[data-subject]').forEach(b =>
    b.classList.toggle('selected', b.dataset.subject === s));

  const badge = document.getElementById('badge-subject');
  badge.textContent = s;
  badge.style.display = 'inline-block';
  document.getElementById('dot-subject').classList.add('done');

  renderStandards();
}

function renderStandards() {
  const { grade, subject } = state;
  const list = (standards[grade] || {})[subject] || [];

  let html = `<div class="list-meta">
    <span class="list-label">${grade}학년 ${subject}</span>
    <span class="list-count">${list.length}개</span>
  </div>`;

  list.forEach((item, i) => {
    html += `<div class="std-item">
      <div class="std-num">${i + 1}</div>
      <div class="std-inner">
        <div class="std-code">${item.code}</div>
        <div class="std-text">${item.text}</div>
      </div>
    </div>`;
  });

  document.getElementById('standards-body').innerHTML = html;
  document.getElementById('card-standards').classList.add('active');
  document.getElementById('dot-standards').classList.add('done');
}
